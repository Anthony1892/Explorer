name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set environment secrets
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL_PROD }}" >> $GITHUB_ENV
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_PROD }}" >> $GITHUB_ENV
          else
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL_DEV }}" >> $GITHUB_ENV
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_DEV }}" >> $GITHUB_ENV
          fi

      - name: Inject config
        run: |
          echo "const SUPABASE_URL = '${SUPABASE_URL}';" > config.js
          echo "const SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}';" >> config.js
          echo "--- config.js preview ---"
          cat config.js

      - name: Prepare publish directory
        run: |
          mkdir -p publish
          cp index.html publish/ 2>/dev/null || true
          cp reset-password.html publish/ 2>/dev/null || true
          cp email-confirm.html publish/ 2>/dev/null || true
          cp config.js publish/
          ls -la publish/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          allow_empty_commit: true
          force_orphan: true