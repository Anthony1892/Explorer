<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --green:    #3fb950;
      --green-dim:#1a4a25;
      --blue:     #58a6ff;
      --blue-dim: #1a3a5c;
      --red:      #f85149;
      --red-dim:  #3d1a1a;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --input-bg: #0d1117;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 24px;
      background-image:
        linear-gradient(rgba(88,166,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(88,166,255,.06);
      animation: rise .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--blue-dim);
      border: 1px solid rgba(88,166,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap svg {
      width: 28px; height: 28px;
      stroke: var(--blue); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field { text-align: left; margin-bottom: 16px; }

    label {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: .02em;
    }

    .input-wrap { position: relative; }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      padding: 10px 40px 10px 14px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--blue); }

    .toggle-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      padding: 4px; color: var(--muted);
      display: flex; align-items: center;
    }

    .toggle-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .strength-bar {
      height: 3px; border-radius: 2px;
      margin-top: 8px; background: var(--border); overflow: hidden;
    }

    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width .3s, background .3s;
    }

    .strength-label {
      font-size: .75rem; color: var(--muted);
      margin-top: 4px; min-height: 16px;
    }

    .btn {
      width: 100%; padding: 12px;
      border-radius: 8px; border: none;
      font-family: inherit; font-size: .95rem;
      font-weight: 500; cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }

    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #0d1117; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }

    .message {
      border-radius: 8px; padding: 12px 16px;
      font-size: .88rem; margin-top: 16px;
      text-align: left; display: none;
    }

    .message.error {
      background: var(--red-dim);
      border: 1px solid rgba(248,81,73,.3);
      color: var(--red);
    }

    .message.success {
      background: var(--green-dim);
      border: 1px solid rgba(63,185,80,.3);
      color: var(--green);
    }

    .divider { height: 1px; background: var(--border); margin: 28px 0 20px; }
    .footer-note { font-size: .8rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="card">

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Set New Password</h1>
  <p class="subtitle">Choose a strong password for your account.</p>

  <div class="field">
    <label for="password">New password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
      <button class="toggle-btn" type="button" onclick="toggleVis('password', this)">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="strength-label" id="strength-label"></div>
  </div>

  <div class="field">
    <label for="confirm">Confirm password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
      <button class="toggle-btn" type="button" onclick="toggleVis('confirm', this)">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn btn-primary" id="submit-btn" onclick="submitReset()" disabled>
    Update Password
  </button>

  <div class="message" id="msg"></div>

  <div class="divider"></div>
  <p class="footer-note">You may close this tab after updating.</p>

</div>

<!-- config.js holds SUPABASE_URL and SUPABASE_ANON_KEY — never commit this file -->
<script src="config.js"></script>

<script>
  // Read token from URL hash — Supabase appends it as:
  // reset-password.html#access_token=xxx&type=recovery&...
  const hashParams   = new URLSearchParams(location.hash.replace('#', ''));
  const queryParams  = new URLSearchParams(location.search);

  const accessToken  = hashParams.get('access_token') || queryParams.get('access_token');
  const tokenType    = hashParams.get('type')         || queryParams.get('type');
  const tokenHash    = queryParams.get('token_hash');

  // Do not show any error yet — wait until the user actually submits
  // The expiry error will only appear when Supabase rejects the token on submit

  const pwInput   = document.getElementById('password');
  const cfInput   = document.getElementById('confirm');
  const submitBtn = document.getElementById('submit-btn');

  // Enable submit only when passwords are valid and match
  pwInput.addEventListener('input', () => { updateStrength(pwInput.value); validate(); });
  cfInput.addEventListener('input', validate);

  function updateStrength(pw) {
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (pw.length >= 6)    score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (pw.length >= 10)   score++;

    const map = [
      { w: '0%',   bg: 'transparent', txt: '' },
      { w: '33%',  bg: '#f85149',     txt: 'Weak' },
      { w: '66%',  bg: '#d29922',     txt: 'Fair' },
      { w: '100%', bg: '#3fb950',     txt: 'Strong' },
      { w: '100%', bg: '#3fb950',     txt: 'Strong' },
    ];
    const s = map[Math.min(score, 4)];
    fill.style.width      = s.w;
    fill.style.background = s.bg;
    label.textContent     = s.txt;
    label.style.color     = s.bg;
  }

  function validate() {
    const pw = pwInput.value;
    const cf = cfInput.value;
    submitBtn.disabled = !(pw.length >= 6 && pw === cf);
  }

  function toggleVis(id, btn) {
    const input  = document.getElementById(id);
    const hidden = input.type === 'password';
    input.type   = hidden ? 'text' : 'password';
    btn.querySelector('svg').style.opacity = hidden ? '0.4' : '1';
  }

  async function submitReset() {
    const newPassword = pwInput.value;
    submitBtn.disabled    = true;
    submitBtn.textContent = 'Updating…';

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${accessToken}`,
        },
        body: JSON.stringify({ password: newPassword }),
      });

      const data = await res.json();

      if (!res.ok) {
        // 401 from Supabase means the token has expired
        const isExpired = res.status === 401 ||
          (data.msg  || data.message || data.error_description || '')
            .toLowerCase().includes('expir');

        const friendlyMsg = isExpired
          ? 'This reset link has expired. Please request a new one from the app.'
          : (data.msg || data.message || data.error_description || 'Update failed. Please try again.');

        showMsg(friendlyMsg, 'error');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Update Password';
        return;
      }

      showMsg('Password updated successfully. You can now sign in to the app.', 'success');
      submitBtn.textContent = 'Done';
      pwInput.disabled = true;
      cfInput.disabled = true;

    } catch (_) {
      showMsg('Connection error. Please check your network and try again.', 'error');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Update Password';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent   = text;
    el.className     = `message ${type}`;
    el.style.display = 'block';
  }
</script>
</body>
</html>
